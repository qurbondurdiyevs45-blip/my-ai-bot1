<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Well Sandbox</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #05050a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .instructions {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(20, 20, 30, 0.8);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }
        button {
            background: #3a3a5e;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        button:hover {
            background: #5a5a8e;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0">Gravity Well</h2>
        <p class="instructions">Click and drag to cast particles. Hold Shift to create a Singularity.</p>
    </div>

    <div class="controls">
        <button onclick="reset()">Clear Screen</button>
        <button onclick="toggleTrail()">Toggle Trails</button>
    </div>

    <canvas id="world"></canvas>

    <script>
        const canvas = document.getElementById('world');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        let wells = [];
        let isMouseDown = false;
        let mouse = { x: 0, y: 0 };
        let showTrails = true;

        class Particle {
            constructor(x, y, vx, vy, hue) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.hue = hue;
                this.life = 1;
                this.size = Math.random() * 2 + 1;
            }

            update() {
                // Apply forces from all gravity wells
                wells.forEach(well => {
                    const dx = well.x - this.x;
                    const dy = well.y - this.y;
                    const distSq = dx * dx + dy * dy;
                    const force = well.mass / Math.max(distSq, 100);
                    const angle = Math.atan2(dy, dx);
                    
                    this.vx += Math.cos(angle) * force;
                    this.vy += Math.sin(angle) * force;
                });

                this.vx *= 0.99; // Air resistance
                this.vy *= 0.99;
                this.x += this.vx;
                this.y += this.vy;

                // Despawn logic
                if (this.x < -100 || this.x > width + 100 || this.y < -100 || this.y > height + 100) {
                    this.life = 0;
                }
            }

            draw() {
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function spawnParticles(x, y, count) {
            const hue = Math.floor(Date.now() / 20) % 360;
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                particles.push(new Particle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, hue));
            }
        }

        function loop() {
            if (showTrails) {
                ctx.fillStyle = 'rgba(5, 5, 10, 0.1)';
                ctx.fillRect(0, 0, width, height);
            } else {
                ctx.clearRect(0, 0, width, height);
            }

            if (isMouseDown) {
                spawnParticles(mouse.x, mouse.y, 2);
            }

            // Draw Gravity Wells
            wells.forEach(well => {
                const grad = ctx.createRadialGradient(well.x, well.y, 0, well.x, well.y, 30);
                grad.addColorStop(0, '#fff');
                grad.addColorStop(0.2, '#00f2fe');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(well.x, well.y, 30, 0, Math.PI * 2);
                ctx.fill();
            });

            // Update and Draw Particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(loop);
        }

        function reset() {
            particles = [];
            wells = [];
        }

        function toggleTrail() {
            showTrails = !showTrails;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousedown', (e) => {
            if (e.shiftKey) {
                wells.push({ x: e.clientX, y: e.clientY, mass: 6 });
            } else {
                isMouseDown = true;
            }
        });
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        resize();
        loop();
    </script>
</body>
</html>
