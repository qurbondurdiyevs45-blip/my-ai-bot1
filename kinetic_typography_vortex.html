<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Typography Vortex</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00ffcc;
        }

        .instructions {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        #input-field {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            color: white;
            border-radius: 30px;
            outline: none;
            width: 250px;
            text-align: center;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        #input-field:focus {
            width: 350px;
            border-color: #00ffcc;
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <h1>Kinetic Vortex</h1>
        <div class="instructions">Move mouse to influence flow • Type to change matter</div>
    </div>

    <input type="text" id="input-field" placeholder="Change the flow..." maxlength="20">

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const inputField = document.getElementById('input-field');

        let width, height;
        let particles = [];
        let text = "VORTEX";
        const mouse = { x: -1000, y: -1000 };

        function init() {
            resize();
            createParticles();
            animate();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(char) {
                this.char = char;
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 20 + 10;
                this.baseSize = this.size;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.05;
                this.color = `hsl(${Math.random() * 60 + 170}, 80%, 60%)`;
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                // Gravity well towards mouse
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const force = Math.max(0, (200 - dist) / 200);

                this.vx += (dx / dist) * force * 0.5;
                this.vy += (dy / dist) * force * 0.5;

                // Friction
                this.vx *= 0.98;
                this.vy *= 0.98;

                this.x += this.vx;
                this.y += this.vy;
                this.angle += this.spin + (force * 0.2);

                // Wrap around screen
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
                if (this.y < -50) this.y = height + 50;
                if (this.y > height + 50) this.y = -50;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.font = `bold ${this.size}px monospace`;
                ctx.fillText(this.char, 0, 0);
                ctx.restore();
            }
        }

        function createParticles() {
            particles = [];
            const count = 300;
            for (let i = 0; i < count; i++) {
                const char = text.charAt(i % text.length);
                particles.push(new Particle(char));
            }
        }

        function animate() {
            // Subtle trail effect
            ctx.fillStyle = 'rgba(5, 5, 5, 0.15)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        inputField.addEventListener('input', (e) => {
            text = e.target.value || "VORTEX";
            // Update all current particles with new characters
            particles.forEach((p, i) => {
                p.char = text.charAt(i % text.length);
            });
        });

        init();
    </script>
</body>
</html>
