<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spectral Orb Collider</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #05050a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        kbd { background: #333; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Spectral Orb Collider</h1>
        <p>Interactive Multi-Body Physics Simulation</p>
    </div>
    <div class="controls">
        Click and Drag to spawn orbs<br>
        Press <kbd>C</kbd> to clear<br>
        Press <kbd>G</kbd> to toggle gravity
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let orbs = [];
        let gravity = 0.15;
        let friction = 0.98;
        let wallBounciness = 0.8;
        let isGravityOn = true;

        class Orb {
            constructor(x, y, vx, vy, radius, hue) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = radius;
                this.mass = radius;
                this.hue = hue;
                this.trail = [];
            }

            draw() {
                // Draw Trail
                ctx.beginPath();
                ctx.lineWidth = 2;
                for (let i = 0; i < this.trail.length - 1; i++) {
                    const t = this.trail[i];
                    const alpha = i / this.trail.length;
                    ctx.strokeStyle = `hsla(${this.hue}, 80%, 60%, ${alpha * 0.4})`;
                    ctx.moveTo(t.x, t.y);
                    ctx.lineTo(this.trail[i + 1].x, this.trail[i + 1].y);
                }
                ctx.stroke();

                // Draw Body
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                grad.addColorStop(0, `hsla(${this.hue}, 100%, 80%, 0.9)`);
                grad.addColorStop(1, `hsla(${this.hue}, 100%, 40%, 0.2)`);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsla(${this.hue}, 100%, 50%, 0.6)`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            update() {
                if (isGravityOn) this.vy += gravity * (this.radius / 10);
                this.vx *= 0.999;
                this.vy *= 0.999;
                this.x += this.vx;
                this.y += this.vy;

                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > 15) this.trail.shift();

                // Wall Collisions
                if (this.x + this.radius > width) { this.x = width - this.radius; this.vx *= -wallBounciness; }
                if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -wallBounciness; }
                if (this.y + this.radius > height) { this.y = height - this.radius; this.vy *= -wallBounciness; }
                if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -wallBounciness; }
            }
        }

        function resolveCollision(orb1, orb2) {
            const dx = orb2.x - orb1.x;
            const dy = orb2.y - orb1.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < orb1.radius + orb2.radius) {
                // Static resolution (un-overlap)
                const overlap = (orb1.radius + orb2.radius) - distance;
                const nx = dx / distance;
                const ny = dy / distance;
                orb1.x -= nx * overlap / 2;
                orb1.y -= ny * overlap / 2;
                orb2.x += nx * overlap / 2;
                orb2.y += ny * overlap / 2;

                // Elastic collision dynamics
                const v1n = orb1.vx * nx + orb1.vy * ny;
                const v2n = orb2.vx * nx + orb2.vy * ny;

                const m1 = orb1.mass;
                const m2 = orb2.mass;

                const newV1n = (v1n * (m1 - m2) + 2 * m2 * v2n) / (m1 + m2);
                const newV2n = (v2n * (m2 - m1) + 2 * m1 * v1n) / (m1 + m2);

                orb1.vx += (newV1n - v1n) * nx;
                orb1.vy += (newV1n - v1n) * ny;
                orb2.vx += (newV2n - v2n) * nx;
                orb2.vy += (newV2n - v2n) * ny;
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        let isMouseDown = false;
        let startPos = {x: 0, y: 0};

        window.addEventListener('mousedown', e => {
            isMouseDown = true;
            startPos = {x: e.clientX, y: e.clientY};
        });

        window.addEventListener('mouseup', e => {
            if (!isMouseDown) return;
            const dx = (startPos.x - e.clientX) * 0.15;
            const dy = (startPos.y - e.clientY) * 0.15;
            const radius = 10 + Math.random() * 25;
            const hue = Math.random() * 360;
            orbs.push(new Orb(startPos.x, startPos.y, dx, dy, radius, hue));
            isMouseDown = false;
        });

        window.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'c') orbs = [];
            if (e.key.toLowerCase() === 'g') isGravityOn = !isGravityOn;
        });

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 10, 0.2)';
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < orbs.length; i++) {
                for (let j = i + 1; j < orbs.length; j++) {
                    resolveCollision(orbs[i], orbs[j]);
                }
                orbs[i].update();
                orbs[i].draw();
            }

            if (isMouseDown) {
                // Visual feedback for drag
                ctx.strokeStyle = '#fff';
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(startPos.x, startPos.y);
                ctx.lineTo(startPos.x, startPos.y); // placeholder implementation for current mouse tracking
                ctx.stroke();
                ctx.setLineDash([]);
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        
        // Initial Orbs
        for(let i=0; i<5; i++) {
            orbs.push(new Orb(width/2 + (Math.random()-0.5)*100, height/2, (Math.random()-0.5)*10, (Math.random()-0.5)*10, 15+Math.random()*15, Math.random()*360));
        }

        animate();
    </script>
</body>
</html>
