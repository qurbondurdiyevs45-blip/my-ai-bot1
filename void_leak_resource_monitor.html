<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Leak Monitor</title>
    <style>
        :root {
            --bg: #050508;
            --neon-blue: #00f3ff;
            --neon-pink: #ff007b;
            --grid: rgba(0, 243, 255, 0.1);
        }
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background: var(--bg);
            color: var(--neon-blue);
            font-family: 'Courier New', Courier, monospace;
        }
        #dashboard {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--grid);
        }
        .stat { margin-bottom: 10px; }
        .val { color: var(--neon-pink); font-weight: bold; }
        canvas { display: block; }
        .inst { font-size: 0.8rem; opacity: 0.7; margin-top: 10px; }
        .glitch-text { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <div class="glitch-text">[ VOID_LEAK MONITOR v8.0 ]</div>
        <hr style="border: 0.5px solid var(--neon-blue)">
        <div class="stat">HEAP_ENTROPY: <span id="entropy" class="val">0</span></div>
        <div class="stat">ORPHANED_NODES: <span id="nodes" class="val">0</span></div>
        <div class="stat">LEAK_PRESSURE: <span id="pressure" class="val">0%</span></div>
        <div class="inst">CLICK TO INJECT ARTIFACTS<br>HOLD TO ACCELERATE DECAY</div>
    </div>
    <canvas id="leakCanvas"></canvas>

<script>
/**
 * Void Leak Resource Monitor
 * A dynamic visualization of simulated "memory leaks" and resource churn.
 * Uses a physics-based particle system to represent data fragmentation.
 */

const canvas = document.getElementById('leakCanvas');
const ctx = canvas.getContext('2d');
const entropyEl = document.getElementById('entropy');
const nodesEl = document.getElementById('nodes');
const pressureEl = document.getElementById('pressure');

let width, height;
let artifacts = [];
let isInjecting = false;

class Artifact {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = (Math.random() - 0.5) * 4;
        this.size = Math.random() * 8 + 2;
        this.life = 1.0;
        this.decay = Math.random() * 0.005 + 0.002;
        this.color = Math.random() > 0.8 ? '#ff007b' : '#00f3ff';
        this.connections = [];
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        
        // Boundary bounce
        if (this.x < 0 || this.x > width) this.vx *= -1;
        if (this.y < 0 || this.y > height) this.vy *= -1;
    }

    draw() {
        ctx.globalAlpha = this.life;
        ctx.strokeStyle = this.color;
        ctx.strokeRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
        
        // Fragment trails
        if (Math.random() > 0.95) {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + (Math.random()-0.5)*20, this.y + (Math.random()-0.5)*20);
            ctx.stroke();
        }
    }
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

function spawn(x, y) {
    for(let i=0; i<5; i++) artifacts.push(new Artifact(x || width/2, y || height/2));
}

function drawGrid() {
    ctx.strokeStyle = 'rgba(0, 243, 255, 0.05)';
    ctx.lineWidth = 1;
    const step = 50;
    for(let i=0; i<width; i+=step) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
    }
    for(let i=0; i<height; i+=step) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke();
    }
}

function updateMetrics() {
    entropyEl.innerText = (artifacts.length * 1.42).toFixed(2);
    nodesEl.innerText = Math.floor(artifacts.length / 3);
    const pressure = Math.min((artifacts.length / 500) * 100, 100);
    pressureEl.innerText = pressure.toFixed(1) + '%';
    pressureEl.style.color = pressure > 80 ? '#ff0000' : (pressure > 40 ? '#ff007b' : '#00f3ff');
}

function loop() {
    ctx.fillStyle = 'rgba(5, 5, 8, 0.2)';
    ctx.fillRect(0, 0, width, height);
    
    drawGrid();

    if (isInjecting) spawn();

    for (let i = artifacts.length - 1; i >= 0; i--) {
        const a = artifacts[i];
        a.update();
        a.draw();

        // Proximal binding simulation
        for (let j = i - 1; j >= 0; j--) {
            const b = artifacts[j];
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 100) {
                ctx.globalAlpha = (1 - dist/100) * 0.3;
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
            }
        }

        if (a.life <= 0) artifacts.splice(i, 1);
    }

    updateMetrics();
    requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
window.addEventListener('mousedown', (e) => { isInjecting = true; spawn(e.clientX, e.clientY); });
window.addEventListener('mouseup', () => isInjecting = false);
window.addEventListener('touchstart', (e) => { isInjecting = true; spawn(e.touches[0].clientX, e.touches[0].clientY); });
window.addEventListener('touchend', () => isInjecting = false);

// Init
resize();
// Initial seed data
for(let i=0; i<20; i++) spawn(Math.random()*width, Math.random()*height);
loop();

</script>
</body>
</html>
