<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Logic Flow</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #0a0a12; color: #00ffca; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 0 0 10px #00ffca;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 255, 202, 0.1);
            padding: 15px;
            border: 1px solid #00ffca;
            backdrop-filter: blur(5px);
        }
        button {
            background: transparent;
            color: #00ffca;
            border: 1px solid #00ffca;
            cursor: pointer;
            padding: 5px 10px;
            transition: all 0.3s ease;
        }
        button:hover { background: #00ffca; color: #0a0a12; }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <h1>QUANTUM_LOGIC_FLOW v1.0.4</h1>
        <p>STATUS: ACTIVE_NODE_STREAM</p>
    </div>
    <div class="controls">
        <button onclick="addNode()">+ INJECT NODE</button>
        <button onclick="clearNodes()">RESET GRID</button>
    </div>
    <canvas id="flowCanvas"></canvas>

    <script>
        const canvas = document.getElementById('flowCanvas');
        const ctx = canvas.getContext('2d');
        let nodes = [];
        const maxConnections = 150;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Node {
            constructor(x, y) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.radius = Math.random() * 3 + 2;
                this.pulse = 0;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.pulse += 0.05;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                const glow = Math.sin(this.pulse) * 5;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + glow/2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 255, 202, ${0.5 + Math.sin(this.pulse) * 0.5})`;
                ctx.fill();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ffca';
            }
        }

        function init() {
            nodes = [];
            for (let i = 0; i < 60; i++) {
                nodes.push(new Node());
            }
        }

        function addNode() {
            nodes.push(new Node(canvas.width / 2, canvas.height / 2));
        }

        function clearNodes() {
            init();
        }

        function drawLines() {
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < maxConnections) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 255, 202, ${1 - distance / maxConnections})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 18, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            nodes.forEach(node => {
                node.update();
                node.draw();
            });
            
            drawLines();
            requestAnimationFrame(animate);
        }

        canvas.addEventListener('mousedown', (e) => {
            const burst = 5;
            for(let i=0; i<burst; i++) {
                nodes.push(new Node(e.clientX, e.clientY));
            }
        });

        init();
        animate();
    </script>
</body>
</html>
