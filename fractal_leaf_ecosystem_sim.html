<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fractal Leaf Ecosystem</title>
    <style>
        :root {
            --bg: #0a0f0d;
            --ui: #2d3e33;
            --accent: #4caf50;
        }
        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; height: 100%; }
        canvas { display: block; filter: contrast(1.1) brightness(1.1); }
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 15, 13, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--ui);
            color: #e0e0e0;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { margin: 0 0 10px 0; font-size: 1.2rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        .ctrl { margin-bottom: 10px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; opacity: 0.8; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        button {
            background: var(--accent);
            border: none;
            padding: 8px 15px;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .hint { font-size: 0.7rem; margin-top: 10px; color: #888; }
    </style>
</head>
<body>
    <div class="ui-panel">
        <h1>Fractal Botanica</h1>
        <div class="ctrl">
            <label>Branching Angle</label>
            <input type="range" id="angle" min="10" max="90" value="25">
        </div>
        <div class="ctrl">
            <label>Complexity (Steps)</label>
            <input type="range" id="depth" min="4" max="12" value="8">
        </div>
        <div class="ctrl">
            <label>Wind Intensity</label>
            <input type="range" id="wind" min="0" max="100" value="30">
        </div>
        <button onclick="resetForest()">Re-Plant Forest</button>
        <div class="hint">Click anywhere to spawn a unique seed</div>
    </div>
    <canvas id="cvs"></canvas>

    <script>
        const canvas = document.getElementById('cvs');
        const ctx = canvas.getContext('2d');
        const trees = [];
        let time = 0;

        const settings = {
            angle: 25,
            depth: 8,
            wind: 0.3
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Tree {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.height = Math.random() * 80 + 100;
                this.thickness = Math.random() * 8 + 4;
                this.color = `hsl(${100 + Math.random() * 60}, ${40 + Math.random() * 30}%, ${30 + Math.random() * 20}%)`;
                this.leafColor = `hsl(${80 + Math.random() * 40}, 70%, 50%)`;
                this.phases = Array.from({length: 15}, () => Math.random() * Math.PI * 2);
                this.dna = Math.random();
            }

            draw(depth, x, y, len, angle, thick) {
                if (depth === 0) {
                    ctx.beginPath();
                    ctx.ellipse(x, y, 5, 8, angle, 0, Math.PI * 2);
                    ctx.fillStyle = this.leafColor;
                    ctx.fill();
                    return;
                }

                const x2 = x + Math.sin(angle) * len;
                const y2 = y - Math.cos(angle) * len;

                ctx.strokeStyle = this.color;
                ctx.lineWidth = thick;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x2, y2);
                ctx.stroke();

                const windEffect = Math.sin(time + this.x) * (settings.wind * 0.05);
                const branchAngle = settings.angle * (Math.PI / 180);

                this.draw(depth - 1, x2, y2, len * 0.8, angle + branchAngle + windEffect, thick * 0.7);
                this.draw(depth - 1, x2, y2, len * 0.8, angle - branchAngle + windEffect, thick * 0.7);
            }

            render() {
                this.draw(settings.depth, this.x, this.y, this.height * 0.3, 0, this.thickness);
            }
        }

        function resetForest() {
            trees.length = 0;
            const count = Math.floor(canvas.width / 200);
            for(let i=0; i<count; i++) {
                trees.push(new Tree(100 + (canvas.width - 200) * (i / (count - 1)), canvas.height));
            }
        }

        window.addEventListener('mousedown', (e) => {
            trees.push(new Tree(e.clientX, canvas.height));
        });

        document.querySelectorAll('input').forEach(el => {
            el.addEventListener('input', (e) => {
                settings[e.target.id] = parseFloat(e.target.value);
                if(e.target.id === 'wind') settings.wind /= 100;
            });
        });

        function animate() {
            time += 0.02;
            ctx.fillStyle = 'rgba(10, 15, 13, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Ground gradient
            const grd = ctx.createLinearGradient(0, canvas.height - 100, 0, canvas.height);
            grd.addColorStop(0, '#0a0f0d');
            grd.addColorStop(1, '#1b261e');
            ctx.fillStyle = grd;
            ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

            trees.forEach(t => t.render());
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resize();
            resetForest();
        });

        resize();
        resetForest();
        settings.wind = 0.3;
        animate();
    </script>
</body>
</html>
