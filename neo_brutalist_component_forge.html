<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-Brutalist Component Forge</title>
    <style>
        :root {
            --bg: #ffe02e;
            --fg: #000000;
            --accent: #ff5eec;
            --border: 4px solid #000;
            --shadow: 8px 8px 0px #000;
        }

        * {
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            padding: 2rem;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        .panel {
            background: #fff;
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 1.5rem;
        }

        h1 {
            text-transform: uppercase;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: var(--accent);
            display: inline-block;
            padding: 0.5rem 1rem;
            border: var(--border);
            box-shadow: 5px 5px 0px #000;
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        input[type="range"], input[type="color"], select {
            width: 100%;
            cursor: pointer;
            border: 2px solid #000;
        }

        .preview-box {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            background: #eee;
            background-image: radial-gradient(#000 1px, transparent 1px);
            background-size: 20px 20px;
            border: var(--border);
            position: relative;
        }

        /* Dynamic Class generated by Forge */
        .forge-element {
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            font-weight: 900;
        }

        .code-output {
            margin-top: 2rem;
            background: #222;
            color: #0f0;
            padding: 1rem;
            border: var(--border);
            white-space: pre-wrap;
            font-size: 0.85rem;
            overflow-x: auto;
        }

        button {
            background: var(--accent);
            border: var(--border);
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
        }

        button:active {
            box-shadow: 0px 0px 0px #000;
            transform: translate(4px, 4px);
        }
    </style>
</head>
<body>

    <h1>Component Forge v1.0</h1>

    <div class="container">
        <aside class="panel">
            <div class="control-group">
                <label>Background Color</label>
                <input type="color" id="compBg" value="#ff5eec">
            </div>
            <div class="control-group">
                <label>Shadow Depth</label>
                <input type="range" id="shadowDepth" min="0" max="30" value="12">
            </div>
            <div class="control-group">
                <label>Border Width</label>
                <input type="range" id="borderWidth" min="1" max="15" value="5">
            </div>
            <div class="control-group">
                <label>Rotation (deg)</label>
                <input type="range" id="rotation" min="-15" max="15" value="-2">
            </div>
            <div class="control-group">
                <label>Text Content</label>
                <input type="text" id="compText" value="BRUTAL UI CORE" style="width:100%; border:2px solid #000; padding:5px;">
            </div>
            <button onclick="copyCode()">COPY CSS</button>
        </aside>

        <main>
            <div class="preview-box">
                <div id="target" class="forge-element">
                    BRUTAL UI CORE
                </div>
            </div>

            <div class="code-output" id="codeBlock">/* CSS will appear here */</div>
        </main>
    </div>

    <script>
        const target = document.getElementById('target');
        const codeBlock = document.getElementById('codeBlock');

        const inputs = ['compBg', 'shadowDepth', 'borderWidth', 'rotation', 'compText'];

        function update() {
            const conf = {
                bg: document.getElementById('compBg').value,
                shadow: document.getElementById('shadowDepth').value,
                border: document.getElementById('borderWidth').value,
                rot: document.getElementById('rotation').value,
                txt: document.getElementById('compText').value
            };

            // Apply Styles
            target.style.backgroundColor = conf.bg;
            target.style.border = `${conf.border}px solid #000`;
            target.style.boxShadow = `${conf.shadow}px ${conf.shadow}px 0px #000`;
            target.style.transform = `rotate(${conf.rot}deg)`;
            target.innerText = conf.txt;

            // Visual Polish
            const cssText = `/* Neo-Brutalist Snippet */
.brutal-card {
    background-color: ${conf.bg};
    border: ${conf.border}px solid #000;
    box-shadow: ${conf.shadow}px ${conf.shadow}px 0px #000;
    transform: rotate(${conf.rot}deg);
    padding: 20px;
    font-weight: 900;
    display: inline-block;
}`;
            
            codeBlock.innerText = cssText;
        }

        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', update);
        });

        function copyCode() {
            navigator.clipboard.writeText(codeBlock.innerText);
            alert('CSS Copied to clipboard!');
        }

        // Initialize
        update();
    </script>
</body>
</html>
