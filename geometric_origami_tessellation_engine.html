<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Origami Tessellation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #111;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid #444;
            pointer-events: none;
        }
        .controls h1 {
            margin: 0 0 10px 0;
            font-size: 18px;
            letter-spacing: 2px;
            color: #ff3e3e;
        }
        .controls p {
            font-size: 12px;
            margin: 5px 0;
            opacity: 0.8;
        }
        .hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            letter-spacing: 1px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="controls">
        <h1>ORIGAMI TESS</h1>
        <p>Complexity: <span id="depth-val">4</span></p>
        <p>Phase: <span id="phase-val">0.00</span></p>
    </div>
    <div class="hint">Move pointer to fold space • Click to shift colors</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const depthLabel = document.getElementById('depth-val');
        const phaseLabel = document.getElementById('phase-val');

        let width, height;
        let mouse = { x: 0, y: 0 };
        let hueShift = Math.random() * 360;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mouse.x = width / 2;
            mouse.y = height / 2;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mousedown', () => {
            hueShift = (hueShift + 45) % 360;
        });

        function drawPolygon(x, y, radius, sides, angle, depth) {
            if (depth <= 0) return;

            const points = [];
            for (let i = 0; i < sides; i++) {
                const a = angle + (i * Math.PI * 2) / sides;
                points.push({
                    x: x + Math.cos(a) * radius,
                    y: y + Math.sin(a) * radius
                });
            }

            // Calculation for folding logic
            const foldFactor = (mouse.x / width) * 2 - 1;
            const rotFactor = (mouse.y / height) * Math.PI;
            
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < sides; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.closePath();

            const hue = (hueShift + depth * 30 + time * 20) % 360;
            ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${depth * 0.2})`;
            ctx.fillStyle = `hsla(${hue}, 70%, 20%, 0.05)`;
            ctx.stroke();
            ctx.fill();

            // Recursive Branching
            if (depth > 1) {
                points.forEach((p, i) => {
                    const nextRadius = radius * (0.4 + (Math.sin(time + depth) * 0.1));
                    const nextAngle = angle + rotFactor + (foldFactor * i);
                    drawPolygon(p.x, p.y, nextRadius, sides, nextAngle, depth - 1);
                });
            }
        }

        function animate() {
            time += 0.015;
            ctx.fillStyle = 'rgba(17, 17, 17, 0.15)';
            ctx.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            const sides = 6;
            const baseRadius = Math.min(width, height) * 0.2;
            const depth = 4;

            depthLabel.textContent = depth;
            phaseLabel.textContent = time.toFixed(2);

            ctx.save();
            // Draw primary structure
            drawPolygon(centerX, centerY, baseRadius, sides, time * 0.2, depth);
            
            // Draw secondary inverted structure
            ctx.globalCompositeOperation = 'lighter';
            drawPolygon(centerX, centerY, baseRadius * 0.5, sides, -time * 0.5, depth - 1);
            ctx.restore();

            requestAnimationFrame(animate);
        }

        resize();
        animate();
    </script>
</body>
</html>
