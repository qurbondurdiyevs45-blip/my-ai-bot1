<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chroma Echo Synth Visualizer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .instructions {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            display: flex;
            gap: 15px;
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        button {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>CHROMA ECHO</h1>
        <div class="instructions">Move mouse to play • Click to cycle wave types</div>
    </div>
    <div class="controls">
        <button id="toggleMotion">Toggle Decay</button>
        <span id="currentWave">Wave: Sine</span>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btnMotion = document.getElementById('toggleMotion');
        const waveLabel = document.getElementById('currentWave');

        let width, height;
        let cells = [];
        const spacing = 40;
        let audioCtx, oscillator, gainNode;
        let isAudioStarted = false;
        let decayEnabled = true;
        let waveTypes = ['sine', 'square', 'sawtooth', 'triangle'];
        let waveIndex = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initGrid();
        }

        function initGrid() {
            cells = [];
            for (let x = 0; x < width; x += spacing) {
                for (let y = 0; y < height; y += spacing) {
                    cells.push({
                        x: x + spacing / 2,
                        y: y + spacing / 2,
                        size: 2,
                        hue: 200,
                        energy: 0
                    });
                }
            }
        }

        function initAudio() {
            if (isAudioStarted) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            
            oscillator.type = waveTypes[waveIndex];
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            isAudioStarted = true;
        }

        window.addEventListener('mousemove', (e) => {
            if (!isAudioStarted) return;
            
            const freq = (e.clientX / width) * 1000 + 100;
            const vol = 1 - (e.clientY / height);
            
            oscillator.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
            gainNode.gain.setTargetAtTime(vol * 0.2, audioCtx.currentTime, 0.05);

            cells.forEach(c => {
                const dx = e.clientX - c.x;
                const dy = e.clientY - c.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 150) {
                    c.energy = Math.max(c.energy, (150 - dist) / 10);
                    c.hue = (e.clientX / width) * 360;
                }
            });
        });

        window.addEventListener('mousedown', () => {
            if (!isAudioStarted) {
                initAudio();
            } else {
                waveIndex = (waveIndex + 1) % waveTypes.length;
                oscillator.type = waveTypes[waveIndex];
                waveLabel.innerText = `Wave: ${waveTypes[waveIndex].charAt(0).toUpperCase() + waveTypes[waveIndex].slice(1)}`;
            }
        });

        btnMotion.addEventListener('click', (e) => {
            e.stopPropagation();
            decayEnabled = !decayEnabled;
        });

        function animate() {
            // Trail effect
            ctx.fillStyle = 'rgba(5, 5, 5, 0.1)';
            ctx.fillRect(0, 0, width, height);

            cells.forEach(c => {
                if (decayEnabled) c.energy *= 0.95;
                
                const s = c.size + c.energy * 2;
                const opacity = Math.min(1, c.energy / 5);
                
                ctx.beginPath();
                ctx.arc(c.x, c.y, s, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${c.hue}, 80%, 60%, ${opacity})`;
                ctx.fill();
                
                if (c.energy > 0.5) {
                    ctx.strokeStyle = `hsla(${c.hue + 40}, 100%, 70%, ${opacity * 0.5})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
